server {
    listen 80 default_server;
    index index.php index.html;

    # Redirect root to subfolder
    location = / {
        return 301 /poweradmin/;
    }

    # Static assets under /poweradmin/ served directly from /app/
    location ~* ^/poweradmin/(.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot))$ {
        alias /app/$1;
        expires max;
        log_not_found off;
        access_log off;
    }

    # All /poweradmin/ requests route through index.php
    # REQUEST_URI keeps the /poweradmin prefix so Symfony router can strip it
    location /poweradmin {
        include fastcgi_params;
        fastcgi_pass app-mysql-subfolder:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /app/index.php;
        fastcgi_param SCRIPT_NAME /poweradmin/index.php;
        fastcgi_read_timeout 180;
    }

    rewrite_log on;
    error_log /var/log/nginx/error.log notice;
    access_log /var/log/nginx/access.log;
}
