name: validations

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]
  workflow_dispatch:
    inputs:
      run_quality_check:
        description: 'Run PHP Mess Detector quality check'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup:
    name: Setup & Install Dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Get Composer cache directory
      id: composer-cache-dir
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer dependencies
      uses: actions/cache@v5
      with:
        path: ${{ steps.composer-cache-dir.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Validate composer.json and composer.lock
      run: composer validate --strict --check-lock

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Fix vendor binary permissions
      run: chmod +x vendor/bin/*

    - name: Generate cache key
      id: cache-key
      run: echo "key=${{ runner.os }}-vendor-${{ hashFiles('**/composer.lock') }}" >> $GITHUB_OUTPUT

    - name: Cache vendor directory
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ steps.cache-key.outputs.key }}

  syntax-check:
    name: PHP Syntax Validation
    runs-on: ubuntu-latest
    needs: setup

    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Validate PHP syntax
      run: find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: setup

    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Restore vendor cache
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ needs.setup.outputs.cache-key }}

    - name: Security audit
      run: composer audit

  code-style:
    name: Code Style Check
    runs-on: ubuntu-latest
    needs: setup

    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Restore vendor cache
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ needs.setup.outputs.cache-key }}

    - name: Check code style
      run: composer check:all

  phpstan:
    name: PHPStan Analysis
    runs-on: ubuntu-latest
    needs: setup

    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Restore vendor cache
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ needs.setup.outputs.cache-key }}

    - name: Run PHPStan analysis
      run: composer analyse:phpstan

  psalm:
    name: Psalm Analysis
    runs-on: ubuntu-latest
    needs: setup

    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Restore vendor cache
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ needs.setup.outputs.cache-key }}

    - name: Run Psalm analysis
      run: composer analyse:psalm

  phpmd:
    name: PHP Mess Detector
    runs-on: ubuntu-latest
    needs: setup
    if: github.event_name == 'workflow_dispatch' && inputs.run_quality_check == true

    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Restore vendor cache
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ needs.setup.outputs.cache-key }}

    - name: Run PHP Mess Detector
      run: composer quality:all

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: setup

    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Restore vendor cache
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ needs.setup.outputs.cache-key }}

    - name: Run test suite
      run: composer tests

  compatibility:
    name: PHP ${{ matrix.php-version }} Compatibility
    runs-on: ubuntu-latest
    needs: setup

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4', '8.5']

    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP ${{ matrix.php-version }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        coverage: none

    - name: Get Composer cache directory
      id: composer-cache-dir
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer dependencies
      uses: actions/cache@v5
      with:
        path: ${{ steps.composer-cache-dir.outputs.dir }}
        key: ${{ runner.os }}-php-${{ matrix.php-version }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ matrix.php-version }}-composer-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Fix vendor binary permissions
      run: chmod +x vendor/bin/*

    - name: Check PHP ${{ matrix.php-version }} compatibility
      run: composer compat:${{ matrix.php-version }}

    - name: Compatibility Summary
      if: always()
      run: |
        echo "### PHP ${{ matrix.php-version }} Compatibility Check ✓" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Target PHP Version:** ${{ matrix.php-version }}" >> $GITHUB_STEP_SUMMARY
        echo "**Analysis Tool:** Phan (polyfill parser)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Compatibility check completed for PHP ${{ matrix.php-version }}" >> $GITHUB_STEP_SUMMARY

  twig-csrf-check:
    name: Twig CSRF Field Name Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Check for incorrect CSRF token field names
      run: |
        if grep -rn 'name="csrf_token"' templates/ --include='*.html'; then
          echo "ERROR: Use name=\"_token\" instead of name=\"csrf_token\" for CSRF token fields"
          exit 1
        fi

  locale-check:
    name: Locale Empty Translation Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install gettext
      run: sudo apt-get install -y gettext

    - name: Check for empty translations in .po files
      run: |
        errors=0
        for f in locale/*/LC_MESSAGES/*.po lib/Module/*/locale/*/*.po; do
          [ -f "$f" ] || continue
          stats=$(msgfmt --statistics -o /dev/null "$f" 2>&1)
          if echo "$stats" | grep -q "untranslated"; then
            echo "ERROR: $f has $stats"
            errors=$((errors + 1))
          fi
        done
        if [ "$errors" -gt 0 ]; then
          echo ""
          echo "Found $errors locale file(s) with empty translations."
          exit 1
        fi
        echo "All locale files have complete translations."

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [syntax-check, security-audit, code-style, phpstan, psalm, unit-tests, compatibility, twig-csrf-check, locale-check]
    if: always()

    steps:
    - name: Check job statuses
      env:
        RUNNER_OS: ${{ runner.os }}
        SYNTAX_RESULT: ${{ needs.syntax-check.result }}
        SECURITY_RESULT: ${{ needs.security-audit.result }}
        CODE_STYLE_RESULT: ${{ needs.code-style.result }}
        PHPSTAN_RESULT: ${{ needs.phpstan.result }}
        PSALM_RESULT: ${{ needs.psalm.result }}
        UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
        COMPATIBILITY_RESULT: ${{ needs.compatibility.result }}
        TWIG_CSRF_RESULT: ${{ needs.twig-csrf-check.result }}
        LOCALE_RESULT: ${{ needs.locale-check.result }}
        WORKFLOW_NAME: ${{ github.workflow }}
        RUN_NUMBER: ${{ github.run_number }}
      run: |
        echo "### Validation Summary 🚀" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "**PHP Version:** 8.4" >> "$GITHUB_STEP_SUMMARY"
        echo "**Platform:** $RUNNER_OS" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "**Quality Checks:**" >> "$GITHUB_STEP_SUMMARY"

        if [ "$SYNTAX_RESULT" = "success" ]; then
          echo "- ✅ PHP Syntax Validation" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "- ❌ PHP Syntax Validation" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "$SECURITY_RESULT" = "success" ]; then
          echo "- ✅ Security Audit" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "- ❌ Security Audit" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "$CODE_STYLE_RESULT" = "success" ]; then
          echo "- ✅ Code Style (PHP_CodeSniffer)" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "- ❌ Code Style (PHP_CodeSniffer)" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "$PHPSTAN_RESULT" = "success" ]; then
          echo "- ✅ Static Analysis (PHPStan level 3)" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "- ❌ Static Analysis (PHPStan level 3)" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "$PSALM_RESULT" = "success" ]; then
          echo "- ✅ Static Analysis (Psalm level 4)" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "- ❌ Static Analysis (Psalm level 4)" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "$UNIT_TESTS_RESULT" = "success" ]; then
          echo "- ✅ Unit Tests (PHPUnit)" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "- ❌ Unit Tests (PHPUnit)" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "$COMPATIBILITY_RESULT" = "success" ]; then
          echo "- ✅ PHP Compatibility (8.2, 8.3, 8.4, 8.5)" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "- ❌ PHP Compatibility (8.2, 8.3, 8.4, 8.5)" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "$TWIG_CSRF_RESULT" = "success" ]; then
          echo "- ✅ Twig CSRF Field Name Check" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "- ❌ Twig CSRF Field Name Check" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "$LOCALE_RESULT" = "success" ]; then
          echo "- ✅ Locale Empty Translation Check" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "- ❌ Locale Empty Translation Check" >> "$GITHUB_STEP_SUMMARY"
        fi

        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "**Workflow:** $WORKFLOW_NAME (#$RUN_NUMBER)" >> "$GITHUB_STEP_SUMMARY"

    - name: Fail if any job failed
      if: |
        needs.syntax-check.result != 'success' ||
        needs.security-audit.result != 'success' ||
        needs.code-style.result != 'success' ||
        needs.phpstan.result != 'success' ||
        needs.psalm.result != 'success' ||
        needs.unit-tests.result != 'success' ||
        needs.compatibility.result != 'success' ||
        needs.twig-csrf-check.result != 'success' ||
        needs.locale-check.result != 'success'
      run: exit 1

