name: Docker Delete Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker Hub tag to delete (e.g. next)'
        required: true
        type: string

jobs:
  delete-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Delete tag on Docker Hub
        env:
          HUB_USER: ${{ github.repository_owner }}
          HUB_TOKEN: ${{ secrets.DOCKER_PASSWORD }}
          TAG: ${{ inputs.tag }}
        run: |
          JWT=$(curl -sf -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${HUB_USER}\", \"password\": \"${HUB_TOKEN}\"}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            "https://hub.docker.com/v2/repositories/poweradmin/poweradmin/tags/${TAG}/" \
            -H "Authorization: JWT ${JWT}")
          echo "DELETE ${TAG}: HTTP ${CODE}"
          [ "${CODE}" = "204" ] || [ "${CODE}" = "200" ] || exit 1
