name: Renovate Post-Processing

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  postprocess:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'

      - name: Optimize vendor for production
        run: |
          composer install --no-dev --prefer-dist --no-progress
          composer dump-autoload --optimize
          git checkout -- vendor/composer/installed.php

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: "chore(deps): optimize vendor for production"
          file_pattern: "vendor/"
