name: Twig Linting

on:
  workflow_dispatch:
  push:
    branches: [ "master", "release/4.2.x", "release/4.3.x" ]
    paths:
      - 'templates/**/*.twig'
      - 'templates/**/*.html'
      - '.github/workflows/twig-lint.yml'
  pull_request:
    branches: [ "master", "release/4.2.x", "release/4.3.x" ]
    paths:
      - 'templates/**/*.twig'
      - 'templates/**/*.html'
      - '.github/workflows/twig-lint.yml'

permissions:
  contents: read
  pull-requests: read

jobs:
  twigcs:
    runs-on: ubuntu-latest
    name: TwigCS Linting

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache-dir
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.composer-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-composer-twigcs-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-twigcs-
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          rm -rf vendor
          composer install --no-interaction --no-progress
          composer require --dev friendsoftwig/twigcs --no-interaction --no-progress

      - name: Run TwigCS linter
        run: vendor/bin/twigcs templates --reporter githubAction --severity error

      - name: Lint Summary
        if: always()
        run: |
          echo "### Twig Linting Summary ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Linter:** TwigCS (friendsoftwig/twigcs)" >> $GITHUB_STEP_SUMMARY
          echo "**Templates checked:** templates/ (*.twig, *.html)" >> $GITHUB_STEP_SUMMARY
          echo "**Severity level:** error" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Twig template validation completed" >> $GITHUB_STEP_SUMMARY
